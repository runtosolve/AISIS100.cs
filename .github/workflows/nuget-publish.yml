name: Publish .NET Package

on:
  release:
    types: [ published, edited ]
  workflow_dispatch:

jobs:
  publish:
    
    permissions:
      id-token: write # Use GitHub OIDC token to publish to NuGet.org
    
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'  # Use the version of the .NET SDK that you're using

      # Extract version from GitHub release tag (assuming the tag is something like v1.0.0)
      - name: Extract version from GitHub release tag
        id: extract_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION=$(echo "$TAG" | sed 's/^v//')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore AISIS100/AISIS100.csproj

      # Build the project
      - name: Build the project
        run: dotnet build AISIS100/AISIS100.csproj --configuration Release --no-restore

      # Pack the project to generate the NuGet package
      - name: Pack NuGet package
        run: dotnet pack AISIS100/AISIS100.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.extract_version.outputs.VERSION }}
      
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address

      # Publish to NuGet.org
      - name: Publish to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
